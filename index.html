<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f7f3ea">
    <title>撮影データ受け渡し確認書</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="signature-tool" aria-label="撮影データ受け渡し確認書">
        <header class="tool-header">
          <div>
            <h1>受け渡し確認書</h1>
            <p class="company-line">署名依頼元：有限会社COO</p>
          </div>
        </header>

        <div class="record-fields" aria-label="記入欄">
          <label class="field">
            <span>日付</span>
            <input id="recordDate" type="date">
          </label>

          <label class="field">
            <span>担当者</span>
            <select id="personInCharge" aria-label="担当者">
              <option value="yoshizawa-kazuki">吉澤一輝</option>
              <option value="yasuda">安田</option>
            </select>
          </label>
        </div>

        <fieldset class="content-field" aria-label="共有方法">
          <legend>共有方法</legend>
          <label><input type="checkbox" name="shareMethod" value="SDカード"> SDカード</label>
          <label><input type="checkbox" name="shareMethod" value="SSD"> SSD</label>
          <label><input type="checkbox" name="shareMethod" value="ギガファイル"> ギガファイル</label>
          <label><input type="checkbox" name="shareMethod" value="S×S"> S×S</label>
          <label><input type="checkbox" name="shareMethod" value="その他"> その他</label>
        </fieldset>

        <label class="field detail-field">
          <span>共有方法の詳細</span>
          <textarea id="shareDetail" rows="3" placeholder="例：SDカード2枚、SSD 1台、ギガファイルURL、S×S案件名など"></textarea>
        </label>

        <fieldset class="content-field" aria-label="データ内容">
          <legend>データ内容</legend>
          <label><input type="checkbox" name="dataContent" value="MP4"> MP4</label>
          <label><input type="checkbox" name="dataContent" value="Prores"> Prores</label>
          <label><input type="checkbox" name="dataContent" value="JPEG"> JPEG</label>
          <label><input type="checkbox" name="dataContent" value="PNG"> PNG</label>
          <label><input type="checkbox" name="dataContent" value="音声"> 音声</label>
          <label><input type="checkbox" name="dataContent" value="その他"> その他</label>
        </fieldset>

        <p class="agreement-note" id="agreementNote">
          有限会社COOは、上記撮影データを指定の方法で受け渡しました。本署名をもって受渡しの証明とし、受領後は紛失、破損、誤送信等がないよう、責任をもって適切に保管・管理してください。
        </p>

        <div class="canvas-wrap">
          <canvas id="signatureCanvas" aria-label="ここに署名してください"></canvas>
          <div class="guide-line" aria-hidden="true"></div>
          <p class="hint" id="emptyHint">指でここに署名</p>
        </div>

        <div class="controls" aria-label="署名の設定">
          <label class="control">
            <span>太さ</span>
            <input id="sizeInput" type="range" min="2" max="9" step="1" value="4">
          </label>

          <fieldset class="colors" aria-label="インク色">
            <legend>色</legend>
            <button class="swatch active" type="button" data-color="#171717" aria-label="黒"></button>
            <button class="swatch" type="button" data-color="#163f7a" aria-label="青"></button>
            <button class="swatch" type="button" data-color="#7c1d1d" aria-label="赤"></button>
          </fieldset>
        </div>

        <footer class="actions">
          <div class="action-pair">
            <button class="secondary" id="clearButton" type="button">消去</button>
            <button class="secondary" id="undoButton" type="button">一つ戻る</button>
          </div>
          <button class="primary" id="saveButton" type="button">PNG保存</button>
        </footer>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
